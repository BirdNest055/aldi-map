name: REWE Fetch

# Triggered by the discount-map app when a user clicks "Fetch Discounts" on a REWE store.
# The workflow runs the CloakBrowser-based fetcher, saves results to Supabase,
# and the app polls for the results.

on:
  workflow_dispatch:
    inputs:
      store_url:
        description: 'Full REWE store offers URL'
        required: true
        type: string
      store_id:
        description: 'Store ID from the map app'
        required: true
        type: string

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CloakBrowser + deps + fingerprint fonts
        run: |
          pip install cloakbrowser
          # CloakBrowser auto-downloads the stealth Chromium binary on first run

          # Install font packages recommended by CloakBrowser docs:
          # https://github.com/CloakHQ/cloakbrowser#font-setup-on-linux
          # These prevent anti-bot canvas-hash mismatches (Kasada, Akamai, etc.)
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            fonts-noto-color-emoji \
            fonts-freefont-ttf \
            fonts-unifont \
            fonts-ipafont-gothic \
            fonts-wqy-zenhei \
            fonts-tlwg-loma-otf \
            fontconfig
          # Refresh font cache so Chromium picks them up
          sudo fc-cache -f
          # Verify (show first 8 of each)
          fc-list | wc -l | xargs -I{} echo "Total fonts installed: {}"
          fc-list | grep -iE 'noto|freefont|unifont|ipa|wqy|loma' | head -8

      - name: Run REWE fetcher
        env:
          # Silence the warning if any optional Windows fonts are missing
          # (full Windows fonts require copying from a real Windows machine,
          # which isn't feasible on GHA runners — see CloakBrowser docs)
          CLOAKBROWSER_SUPPRESS_FONT_WARNING: "1"
          STORE_URL: ${{ inputs.store_url }}
          STORE_ID: ${{ inputs.store_id }}
        run: |
          echo "Fetching offers from: $STORE_URL"
          python3 fetchers/rewe_fetcher.py "$STORE_URL" > /tmp/rewe-result.json 2>/tmp/rewe-stderr.log
          EXIT_CODE=$?
          
          # Show CloakBrowser logs + any structured error output
          cat /tmp/rewe-stderr.log
          
          if [ $EXIT_CODE -ne 0 ]; then
            # Parse structured error line: "error|<category>|<stage>|<signature>"
            ERROR_LINE=$(grep -E '^error\|' /tmp/rewe-stderr.log | tail -1 || true)
            ERROR_CATEGORY=$(echo "$ERROR_LINE" | cut -d'|' -f2 || echo "unknown")
            ERROR_STAGE=$(echo "$ERROR_LINE" | cut -d'|' -f3 || echo "unknown")
            ERROR_SIG=$(echo "$ERROR_LINE" | cut -d'|' -f4 || echo "n/a")
            
            echo "FETCH_FAILED=true" >> "$GITHUB_OUTPUT"
            echo "error_category=$ERROR_CATEGORY" >> "$GITHUB_OUTPUT"
            echo "error_stage=$ERROR_STAGE" >> "$GITHUB_OUTPUT"
            echo "error_sig=$ERROR_SIG" >> "$GITHUB_OUTPUT"
            echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
            
            # Categorize for the GHA annotation
            case "$ERROR_CATEGORY" in
              network)  MSG="Network error (CloakBrowser couldn't reach REWE)" ;;
              parse)    MSG="Parse error (REWE page structure changed or Cloudflare blocked)" ;;
              storage)  MSG="Storage error (couldn't write result file)" ;;
              *)        MSG="Unknown fetcher error" ;;
            esac
            
            echo "::error title=REWE fetch failed ($ERROR_CATEGORY@$ERROR_STAGE)::$MSG (exit=$EXIT_CODE, sig=$ERROR_SIG)"
            exit 1
          fi
          
          echo "FETCH_SUCCESS=true" >> "$GITHUB_OUTPUT"
          
          # Show summary
          python3 -c "
          import json
          d = json.load(open('/tmp/rewe-result.json'))
          print(f'Store: {d[\"store\"][\"name\"]}')
          print(f'Products: {d[\"count\"]}')
          print(f'Price range: {min(p[\"price\"] for p in d[\"products\"]):.2f} - {max(p[\"price\"] for p in d[\"products\"]):.2f} EUR')
          "

      - name: Save to Supabase
        id: save
        if: steps.fetch.outputs.FETCH_SUCCESS == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          STORE_ID: ${{ inputs.store_id }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, sys

          data = json.load(open('/tmp/rewe-result.json'))
          store_id = os.environ['STORE_ID']
          supabase_url = os.environ['SUPABASE_URL']
          supabase_key = os.environ['SUPABASE_SECRET_KEY']

          headers = {
              'apikey': supabase_key,
              'Authorization': f'Bearer {supabase_key}',
              'Content-Type': 'application/json',
          }

          # Delete old discounts for this store
          try:
              req = urllib.request.Request(
                  f'{supabase_url}/rest/v1/discounts?store_id=eq.{store_id}',
                  method='DELETE', headers=headers,
              )
              urllib.request.urlopen(req, timeout=30)
          except urllib.error.HTTPError as e:
              print(f"error|storage|delete-old|delete-failed", file=sys.stderr)
              print(f"STORAGE ERROR [delete]: HTTP {e.code}: {e.read().decode()}", file=sys.stderr)
              sys.exit(30)
          except Exception as e:
              print(f"error|storage|delete-old|{type(e).__name__}", file=sys.stderr)
              print(f"STORAGE ERROR [delete]: {type(e).__name__}: {e}", file=sys.stderr)
              sys.exit(30)

          # Insert new discounts
          rows = []
          for p in data['products']:
              rows.append({
                  'store_id': store_id,
                  'product_title': p['productTitle'],
                  'brand': p.get('brand'),
                  'price': p['price'],
                  'regular_price': p.get('regularPrice'),
                  'currency': p['currency'],
                  'category': p.get('category'),
                  'valid_from': None,
                  'valid_until': None,
                  'fetched_at': p['fetchedAt'],
              })

          if rows:
              try:
                  body = json.dumps(rows).encode()
                  req = urllib.request.Request(
                      f'{supabase_url}/rest/v1/discounts',
                      data=body, method='POST',
                      headers={**headers, 'Prefer': 'return=minimal'},
                  )
                  urllib.request.urlopen(req, timeout=60)
                  print(f'Saved {len(rows)} discounts to Supabase for store {store_id}')
              except urllib.error.HTTPError as e:
                  print(f"error|storage|insert|insert-failed", file=sys.stderr)
                  print(f"STORAGE ERROR [insert]: HTTP {e.code}: {e.read().decode()}", file=sys.stderr)
                  sys.exit(30)
              except Exception as e:
                  print(f"error|storage|insert|{type(e).__name__}", file=sys.stderr)
                  print(f"STORAGE ERROR [insert]: {type(e).__name__}: {e}", file=sys.stderr)
                  sys.exit(30)
          else:
              print('No products to save')
          PYEOF

      - name: Log fetch failure to Supabase fetch_log
        if: always() && steps.fetch.outputs.FETCH_FAILED == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          STORE_ID: ${{ inputs.store_id }}
          ERROR_CATEGORY: ${{ steps.fetch.outputs.error_category }}
          ERROR_STAGE: ${{ steps.fetch.outputs.error_stage }}
          ERROR_SIG: ${{ steps.fetch.outputs.error_sig }}
          EXIT_CODE: ${{ steps.fetch.outputs.exit_code }}
        run: |
          # Best-effort: log the failure to fetch_log for audit
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error
          try:
              store_id = os.environ['STORE_ID']
              supabase_url = os.environ['SUPABASE_URL']
              supabase_key = os.environ['SUPABASE_SECRET_KEY']
              err_cat = os.environ.get('ERROR_CATEGORY', 'unknown')
              err_stage = os.environ.get('ERROR_STAGE', 'unknown')
              err_sig = os.environ.get('ERROR_SIG', 'n/a')
              exit_code = os.environ.get('EXIT_CODE', '50')

              body = json.dumps({
                  'store_id': store_id,
                  'fetched_at': __import__('datetime').datetime.utcnow().isoformat() + 'Z',
                  'success': False,
                  'error': f'{err_cat}@{err_stage} (sig={err_sig}, exit={exit_code})',
                  'client_ip': 'github-actions',
                  'duration_ms': None,
                  'count': None,
              }).encode()

              req = urllib.request.Request(
                  f'{supabase_url}/rest/v1/fetch_log',
                  data=body, method='POST',
                  headers={
                      'apikey': supabase_key,
                      'Authorization': f'Bearer {supabase_key}',
                      'Content-Type': 'application/json',
                      'Prefer': 'return=minimal',
                  },
              )
              urllib.request.urlopen(req, timeout=15)
              print(f'Logged fetch failure to fetch_log for store {store_id}')
          except Exception as e:
              print(f'WARNING: could not log to fetch_log: {e}')
          PYEOF

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rewe-result
          path: /tmp/rewe-result.json
          retention-days: 7
